name: Build APK

on:
  # Trigger on push to main OR master (covers both GitHub default branch names)
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # IMPORTANT: Also allows you to trigger manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the code ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 (required for Android Gradle plugin 8.x) ──────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Install Gradle 8.6 directly (avoids needing wrapper JAR binary) ──
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # ── 4. Cache Android SDK components ─────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 5. Accept Android SDK licenses ──────────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 6. Build the release APK using installed Gradle (not ./gradlew) ─────
      - name: Build Release APK
        run: gradle assembleRelease --stacktrace --no-daemon

      # ── 7. Upload APK — download it from the Actions tab when done ──────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPS-Tracker-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 8. On tagged releases (e.g. git tag v1.0), auto-create a Release ────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
